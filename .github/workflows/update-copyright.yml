name: Update copyright year

# Runs a few minutes into Jan 1 each year (and on demand) to roll the
# footer copyright range forward. Commits only if something changed.
on:
  schedule:
    - cron: '5 0 1 1 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Stamp current year
        run: node tools/update-copyright.js
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Roll copyright year forward [skip ci]"
            git push
          else
            echo "Copyright already current, nothing to commit."
          fi
